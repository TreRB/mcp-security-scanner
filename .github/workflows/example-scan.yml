name: "Example: MCP server security scan (TEMPLATE)"

# TEMPLATE: copy this into your MCP-server repo's .github/workflows/
# directory. In the scanner's own repo it's `workflow_dispatch`-only to
# avoid running against itself — enable push/schedule triggers in your
# copy.
#
# Uploads findings to GitHub Code Scanning via SARIF.
#
# When you copy this to your repo:
#   1. Remove this comment block
#   2. Swap the commented triggers for active ones
#   3. Adjust the path argument (`.` scans repo root)

on:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]
  # schedule:
  #   - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  mcp-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/checkout@v4
        with:
          repository: TreRB/mcp-security-scanner
          path: scanner

      - name: Install scanner from source
        run: |
          cd scanner
          npm install
          npm link
        # Alternative once published to npm:
        # run: npm install -g valtik-mcp-security-scanner

      - name: Run MCP scan (SARIF)
        run: |
          mcp-security-scanner . \
            --format sarif \
            --out findings.sarif \
            --ci

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: findings.sarif
          category: mcp-security

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-scan-report
          path: findings.sarif
